title: Alkotók

<h1>Alkotók</h1>
<ul>
    {%- for author in site.authors -%}
        <img src="{{ author.face }}" alt="{{ author.name }}">
        <li>
            <h2>{{ author.name }} ({{ author.nickname }})</h2>
            <h3>{{ author.profession }}</h3>
            <p>{{ author.content | markdownify }}</p>
        </li>
    {%- endfor -%}
</ul>
