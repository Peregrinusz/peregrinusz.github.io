---
layout: default
title: Blog
---
<h1>{{page.title}}</h1>
<p>Cikkek az üzeneted közvetítéséről...</p>

<div class="container">
    {% for post in site.posts %}
        <div class="post">
            <h2><a class="bloglink" href="{{post.url}}">{{post.title}}</a></h2>
            <p>{{post.meta}}</p>
        </div>
    {% endfor %}
</div>
