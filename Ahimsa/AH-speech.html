---
layout: AH-main
nama: "Eddigi előadások"
---
<p>
    Ha érdekelnek a korábbi előadások, írott formában megtalálod ezen az oldalon.
</p>
<div class="container">
    {% for post in site.posts %}
        {%- if post.mark == "AH" -%}
            <div class="post">
                <a href="{{post.url}}">
                    <img class="blogpic" src="{{post.pic}}" alt="{{post.alt}}">
                </a>
                <div class="bl-txt">
                    <h2><a class="bloglink" href="{{post.url}}">{{post.nama}}</a></h2>
                    <p>{{post.meta}}</p>
                </div>
            </div>
        {%- endif -%}        
    {% endfor %}
</div>
