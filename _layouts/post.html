---
layout: default
---
<h1>{{page.title}}</h1>
<p>
    {{page.date | date_to_string}} 
    {%- assign author = site.authors | where: 'nickname', page.author | first -%}
    {%- if author -%}
        - <a href="{{author.url}}">{{author.nickname}}</a>
    {%- endif -%}
</p>
<p id="meta">{{page.meta}}</p>

{{content}}

<script>
    document.getElementById('meta').style.display="none";
</script>
