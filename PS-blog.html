---
layout: PS-default
title: Blog cikkek
---
<div class="szolg">
    <h1>{{page.title}}</h1>
</div>

<div class="container">
    {% for post in site.posts %}
        {%- if post.mark == "PS" -%}
            <div class="post">
                <h2><a class="bloglink" href="{{post.url}}">{{post.nama}}</a></h2>
                <a href="{{post.url}}">
                    <img class="blogpic" src="{{post.pic}}" alt="{{post.alt}}">
                </a>
                <p>{{post.meta}}</p>
            </div>
        {%- endif -%}        
    {% endfor %}
</div>
