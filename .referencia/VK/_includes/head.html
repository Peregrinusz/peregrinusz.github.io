<nav>
    <label  for="mobil" class="btn-mob">
        <span></span>
        <span></span>
        <span></span>
    </label>
    <input id="mobil" type="checkbox">
    <ul class="menu">
        {% for item in site.data.navigation %}
            {% if page.url == item.link %}
                {% continue %}
            {% else %}
                <li>
                    <a href="{{ item.link }}">
                        {{ item.name }}
                    </a>
                </li>            
            {% endif %}        
        {% endfor %}
    </ul>
    <a id="icon" href="/index.html">
        {%- for item in site.data.spec -%}
            <img src="{{ item.src }}" alt="{{ item.alt }}" id="logo">
        {%- endfor -%}
    </a>
</nav>
